<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作品管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>

<body>

<h1>📚 作品管理</h1>

<div class="search-bar">
  <input id="search" placeholder="🔍 検索..." oninput="render()">
  <button onclick="openColumnModal()">⚙️</button>
  <button onclick="openModal()">＋</button>
</div>

<div class="result-bar">
  <span id="resultCount"></span>
</div>

<!-- 列設定 -->
<div id="columnModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeColumnModal()">&times;</span>
    <h3>列表示設定</h3>
    <div class="column-grid">
      <label><input type="checkbox" data-col="main">大</label>
      <label><input type="checkbox" data-col="package">パッケージ</label>
      <label><input type="checkbox" data-col="sub">小</label>
      <label><input type="checkbox" data-col="volume">ボリューム</label>
      <label><input type="checkbox" data-col="url">URL</label>
      <label><input type="checkbox" data-col="ratingCount">評価数</label>
      <label><input type="checkbox" data-col="siteRating">サイト</label>
      <label><input type="checkbox" data-col="authorRating">同人物</label>
      <label><input type="checkbox" data-col="date">更新日</label>
    </div>
  </div>
</div>

<!-- 追加 -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>作品登録 / 編集</h2>

    <input id="main" placeholder="大分類">
    <input id="package" placeholder="パッケージ名">
    <input id="sub" placeholder="小分類">

    <input id="name" placeholder="名前">
    <input id="work" placeholder="作品名">
    <input id="volume" placeholder="ボリューム">

    <input id="url" placeholder="URL">

    <input id="fav" placeholder="⭐">
    <input id="ratingCount" placeholder="評価数">
    <input id="siteRating" placeholder="サイト評価">
    <input id="authorRating" placeholder="同人物評価">

    <button onclick="addItem()">保存</button>
  </div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>No</th>
  <th onclick="sortBy('name')">名前</th>
  <th onclick="sortBy('work')">作品</th>
  <th onclick="sortBy('fav')">⭐</th>
  <th>詳細</th>
  <th>編集</th>
  <th>削除</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>
</div>

</body>
</html>
