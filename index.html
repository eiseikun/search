<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作品管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>

<body>

<h1>📚 作品管理</h1>

<div class="search-box">
  <input id="search" placeholder="検索" oninput="render()">
  <button onclick="toggleDetails()">表示更新</button>
</div>

<div class="column-toggle">
  列表示：
  <label><input type="checkbox" data-col="1">大</label>
  <label><input type="checkbox" data-col="2">パッケージ</label>
  <label><input type="checkbox" data-col="3">小</label>
  <label><input type="checkbox" data-col="4">名前</label>
  <label><input type="checkbox" data-col="5">作品</label>
  <label><input type="checkbox" data-col="6">ボリューム</label>
  <label><input type="checkbox" data-col="7">URL</label>
  <label><input type="checkbox" data-col="8">⭐</label>
  <label><input type="checkbox" data-col="9">評価数</label>
  <label><input type="checkbox" data-col="10">サイト</label>
  <label><input type="checkbox" data-col="11">同人物</label>
  <label><input type="checkbox" data-col="12">更新日</label>
</div>

<!-- 上部バー -->
<div class="top-bar">
  <p id="resultCount"></p>
  <button onclick="openModal()">＋ 追加</button>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>作品登録 / 編集</h2>

    <input id="main" placeholder="大分類">
    <input id="package" placeholder="パッケージ名">
    <input id="sub" placeholder="小分類">

    <input id="name" placeholder="名前">
    <input id="work" placeholder="作品名">
    <input id="volume" placeholder="ボリューム">

    <input id="url" placeholder="URL">

    <input id="fav" placeholder="⭐">
    <input id="ratingCount" placeholder="評価数">
    <input id="siteRating" placeholder="サイト評価">
    <input id="authorRating" placeholder="同人物評価">

    <button onclick="addItem()">保存</button>
  </div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>No</th>
  <th onclick="sortBy('main')">大</th>
  <th onclick="sortBy('package')">パッケージ</th>
  <th onclick="sortBy('sub')">小</th>
  <th onclick="sortBy('name')">名前</th>
  <th onclick="sortBy('work')">作品</th>
  <th>ボリューム</th>
  <th>URL</th>

  <th class="detail" onclick="sortBy('fav')">⭐</th>
  <th class="detail" onclick="sortBy('ratingCount')">評価数</th>
  <th class="detail" onclick="sortBy('siteRating')">サイト</th>
  <th class="detail" onclick="sortBy('authorRating')">同人物</th>
  <th class="detail">更新日</th>

  <th>更新</th>
  <th>編集</th>
  <th>削除</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>
</div>

</body>
</html>
